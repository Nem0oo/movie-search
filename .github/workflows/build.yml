name: Movie search CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_test:
    if: github.event_name == 'pull_request'
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: killer-search
          build-args: SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Running container
        run: |
          docker run -d --name killer-search -p 8080:80 killer-search
      - name: Wait for Apache
        run: sleep 2
      - name: Test title
        run: |
          curl -s http://localhost:8080/version.txt | grep -q ${{ github.sha }}
      - name: Stop container
        run: |
          docker stop killer-search

  build_and_push_to_docker_hub:
    if: github.event_name == 'push'
    name: Build Docker Image with tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Tag previous
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/killer-search:latest && \
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/killer-search:latest ${{ secrets.DOCKERHUB_USERNAME }}/killer-search:previous && \
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/killer-search:previous || true
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/killer-search:latest
          build-args: SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/killer-search:latest

  trigger_watchtower:
    if: github.event_name == 'push'
    needs: build_and_push_to_docker_hub
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy via n8n
        run: |
          curl -H "Content-Type: application/json" "https://n8n.gcourtot.fr/webhook/${{ secrets.N8N_WEBHOOK_ID }}"

  test_prod:
    if: github.event_name == 'push'
    needs: trigger_watchtower
    runs-on: ubuntu-latest
    steps:
      - name: Wait for watchtower
        run: sleep 30
      - name: Test version
        run: |
          for i in {1..10}; do
            curl -sf https://killer-search.gcourtot.fr/version.txt | grep -q ${{ github.sha }} && exit 0
            sleep 10
          done
          exit 1

  trigger_rollback:
    needs: [test_prod, build_and_push_to_docker_hub]
    if: always() && needs.test_prod.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Rollback image
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/killer-search:previous
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/killer-search:previous ${{ secrets.DOCKERHUB_USERNAME }}/killer-search:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/killer-search:latest
      - name: Trigger deploy via n8n
        run: |
          curl -H "Content-Type: application/json" "https://n8n.gcourtot.fr/webhook/${{ secrets.N8N_WEBHOOK_ID }}"